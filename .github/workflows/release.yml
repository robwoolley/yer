name: Release

# Publishing is triggered ONLY by pushing a version tag (e.g. `git push origin
# v0.1.0`). Ordinary pushes and PRs run ci.yml, never this. A `vX.Y.Zrc*` tag
# publishes to TestPyPI (dry run); a final `vX.Y.Z` tag publishes to PyPI.
on:
  push:
    tags:
      - "v*"

permissions: {}  # least privilege; each job opts in to what it needs

jobs:
  build:
    name: Build & guard
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tooling
        run: python -m pip install --upgrade build twine
      - name: Guard — tag == __version__ == newest CHANGELOG version
        run: python scripts/release_consistency.py "${GITHUB_REF_NAME}"
      - name: Build sdist + wheel (once)
        run: python -m build
      - name: Check distribution metadata
        run: twine check dist/*
      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-testpypi:
    name: Publish to TestPyPI (pre-release)
    needs: build
    if: contains(github.ref_name, 'rc')
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write  # OIDC Trusted Publishing — no stored token
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true  # dry-run index only

  publish-pypi:
    name: Publish to PyPI
    needs: build
    if: ${{ !contains(github.ref_name, 'rc') }}
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # OIDC Trusted Publishing — no stored token
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # no skip-existing: republishing an existing version must fail, not overwrite

  github-release:
    name: GitHub Release
    needs: publish-pypi
    runs-on: ubuntu-latest
    permissions:
      contents: write  # create the release + upload the dists
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Build release notes from the CHANGELOG section
        run: python scripts/changelog_section.py "${GITHUB_REF_NAME}" > RELEASE_NOTES.md
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" dist/* --notes-file RELEASE_NOTES.md
